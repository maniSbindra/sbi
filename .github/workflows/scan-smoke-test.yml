# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
---
name: Scan Smoke Test

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  smoke-test:
    name: 🧪 Scan Smoke Test
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: ⤵️ Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: true

      - name: 🚧 Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: 🚧 Setup Task
        uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2.0.0

      - name: 🔀 Download dependencies
        run: go mod download

      - name: 🏗️ Build
        run: task build

      - name: 🔧 Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/860126c650c2d05b63b83a3895e41268162315a3/install.sh | sh -s -- -b /usr/local/bin v1.42.3

      - name: 🔧 Install Trivy
        run: |
          curl -sSfL https://raw.githubusercontent.com/aquasecurity/trivy/6fb20c8edd70745d6b34bff0387b53b03c8a760a/contrib/install.sh | sh -s -- -b /usr/local/bin v0.69.3

      - name: 🔍 Run smoke test scan
        run: |
          ./bin/linux-amd64/sbi scan \
            --database smoke-test.db \
            --config-dir config/smoke-test \
            --output smoke-test-report.md \
            --max-tags 1 \
            --comprehensive \
            -v

      - name: 📊 Verify results
        run: |
          echo "=== Database stats ==="
          sqlite3 smoke-test.db 'SELECT COUNT(*) as images FROM images;'
          IMAGE_COUNT=$(sqlite3 smoke-test.db 'SELECT COUNT(*) FROM images;')
          if [ "$IMAGE_COUNT" -eq 0 ]; then
            echo "ERROR: No images in database"
            exit 1
          fi
          echo "=== Report preview ==="
          head -50 smoke-test-report.md
