# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
---
name: Nightly Registry Scan

on:
  schedule:
    - cron: "0 2 * * *"  # 02:00 UTC nightly
  workflow_dispatch: {}

concurrency:
  group: nightly-registry-scan
  cancel-in-progress: false

permissions: {}

jobs:
  scan-and-update:
    name: 🔍 Scan & Update
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    permissions:
      contents: write
    steps:
      - name: 🔑 Generate App Token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: ⤵️ Checkout (with LFS)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          lfs: true
          fetch-depth: 0

      - name: 🚧 Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true

      - name: 🚧 Setup Task
        uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2.0.0

      - name: 🔀 Download dependencies
        run: go mod download

      - name: 🏗️ Build
        run: task build

      - name: 🔧 Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/860126c650c2d05b63b83a3895e41268162315a3/install.sh | sh -s -- -b /usr/local/bin v1.42.3

      - name: 🔧 Install Trivy
        run: |
          sudo apt-get update -y
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -y
          sudo apt-get install -y trivy=0.69.3

      - name: 🐳 Docker info
        run: docker info

      - name: 🔍 Run nightly scan
        run: |
          ./bin/linux-amd64/daily-recommendations scan \
            --database azure_linux_images.db \
            --config-dir config \
            --output docs/daily_recommendations.md \
            --max-tags 0 \
            --comprehensive \
            --update-existing \
            -v

      - name: 📊 Show database stats
        run: |
          ls -lh azure_linux_images.db || true
          sqlite3 azure_linux_images.db 'SELECT COUNT(*) as images FROM images;' || true

      - name: 📝 Commit & push updates
        if: success()
        run: |
          git config user.name 'sbi-nightly-bot[bot]'
          git config user.email '${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com'
          git add -f azure_linux_images.db docs/daily_recommendations.md docs/daily_recommendations.json || true
          if [ -n "$(git diff --cached --name-only)" ]; then
            CHANGED_FILES=$(git diff --cached --name-only | tr '\n' ' ')
            echo "Changed files: $CHANGED_FILES"
            git commit -m "chore: update nightly scan results [skip ci]"
            git push
          else
            echo 'No changes to commit.'
          fi

      - name: 📤 Upload database artifact
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: nightly-database
          path: azure_linux_images.db
          retention-days: 5
